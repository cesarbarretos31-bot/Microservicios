services:
  catalogdb:
    container_name: catalogdb
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: catalogdb
    restart: always
    ports:
      - "5433:5432"
    volumes:
      - postgres_catalog:/var/lib/postgresql/data/

  basketdb:
    container_name: basketdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: BasketDb
    restart: always
    ports:
      - "5434:5432"
    volumes:
      - postgres_basket:/var/lib/postgresql/data/

  distributedcache:
    container_name: distributedcache
    restart: always
    ports:
      - "6379:6379"

  catalog.api:
    container_name: catalog.api
    build:
      context: .
      dockerfile: src/Catalog.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Database: "Server=ep-square-morning-avj5lhuv.c-11.us-east-1.aws.neon.tech;Database=neondb;User Id=neondb_owner;Password=npg_vhfxel6UAu8X;Ssl Mode=Require;"
    ports:
      - "8080:8080"
    depends_on:
      - catalogdb

  basket.api:
    container_name: basket.api
    build:
      context: .
      dockerfile: src/Basket/Basket.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Database: "Server=ep-wandering-term-avc8nnnz-pooler.c-11.us-east-1.aws.neon.tech;Database=neondb;User Id=neondb_owner;Password=npg_KPyowL8F3RTv;Ssl Mode=Require;"
      ConnectionStrings__Redis: "accessible-brumal-macropure-77133.db.redis.io:14027,password=LGZND2oXDXAJ70x1MV0FtLYm2PtXCWFd"
    ports:
      - "8081:8080"
    depends_on:
      - distributedcache